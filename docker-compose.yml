services:
  tgart:
    build: .
    container_name: tgart-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8083}:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FLASK_ENV=${FLASK_ENV:-production}
      - MAIL_SERVER=${MAIL_SERVER:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USE_SSL=${MAIL_USE_SSL:-false}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-noreply@tgarttattoo.com}
      - CONTACT_RECIPIENT=${CONTACT_RECIPIENT:-szkcsgrg@gmail.com}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://tgarttattoo.hu,https://www.tgarttattoo.hu}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - tgart-data:/app/data
      - tgart-uploads:/app/uploads

volumes:
  tgart-data:
  tgart-uploads:
